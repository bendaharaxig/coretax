<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exociothree</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 15px;
            padding-bottom: 40px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            padding: 30px 25px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .profile-section {
            margin-bottom: 25px;
        }

        .avatar {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #e94560 0%, #0f3460 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.4);
        }

        .avatar svg {
            width: 45px;
            height: 45px;
            fill: white;
        }

        h1 {
            color: #1a1a2e;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #666;
            font-size: 13px;
        }

        .balance-card {
            background: linear-gradient(135deg, #e94560 0%, #0f3460 100%);
            border-radius: 20px;
            padding: 25px 20px;
            color: white;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.3);
        }

        .balance-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .balance-amount {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .balance-source {
            font-size: 13px;
            opacity: 0.85;
        }

        .menu-card {
            background: white;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #e94560 0%, #0f3460 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
        }

        .menu-icon svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        .menu-text {
            flex: 1;
        }

        .menu-title {
            color: #333;
            font-size: 15px;
            font-weight: 600;
        }

        .menu-subtitle {
            color: #888;
            font-size: 12px;
            margin-top: 2px;
        }

        .menu-arrow {
            color: #ccc;
            font-size: 20px;
        }

        .status {
            display: inline-flex;
            align-items: center;
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
        }

        .status svg {
            width: 16px;
            height: 16px;
            fill: white;
            margin-right: 6px;
        }

        @media (max-width: 400px) {
            .container {
                padding: 25px 20px;
                border-radius: 20px;
            }
            
            .balance-amount {
                font-size: 30px;
            }
            
            .avatar {
                width: 75px;
                height: 75px;
            }
            
            .avatar svg {
                width: 38px;
                height: 38px;
            }
        }
    </style>
</head>

                </div>
                <div class="menu-text">

            </div>
        </div>
