<script>

const scriptURL="https://script.google.com/macros/s/AKfycbzIYdl5_JLmo9krpk3vvkbLT7YJKvXi1hzPkUsHHB25BcBV7vlamivI1pLhst8_-zSHww/exec";

let daftarNama=[];
let cachedData=null; // 🔥 cache biar gak fetch ulang

function showLoading(){
    document.getElementById("loadingOverlay").style.display="flex";
}

function hideLoading(){
    document.getElementById("loadingOverlay").style.display="none";
}

async function loadNama(){

    // 🔥 pakai cache kalau ada
    if(cachedData){
        renderNama(cachedData);
        hideLoading();
        return;
    }

    showLoading();

    try{
        const res = await fetch(scriptURL);
        const data = await res.json();

        cachedData = data; // simpan cache
        renderNama(data);

    }catch(e){
        alert("Gagal memuat data nama");
    }

    hideLoading();
}

function renderNama(data){
    const select = document.getElementById("email");
    select.innerHTML = '<option value="">Pilih Nama Anggota</option>';

    if(data.namaAnggota){
        daftarNama = data.namaAnggota;

        const fragment = document.createDocumentFragment(); // 🔥 lebih ringan

        data.namaAnggota.forEach((nama, index)=>{
            const opt = document.createElement("option");
            opt.value = index + 1;
            opt.textContent = (index + 1) + " - " + nama;
            fragment.appendChild(opt);
        });

        select.appendChild(fragment);
    }
}

function getDevice(){
    return navigator.userAgent;
}

async function loginHandler(event){
    event.preventDefault();

    const btn = document.getElementById("loginBtn");
    btn.disabled = true;
    btn.innerHTML = 'Loading...'; // 🔥 indikator klik

    const absen = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if(absen === ""){
        alert("Pilih absen dulu!");
        btn.disabled = false;
        btn.innerHTML = 'Masuk';
        return false;
    }

    if(password === "12345678"){

        const nama = daftarNama[absen - 1];

        try{
            await fetch(scriptURL, {
                method: "POST",
                body: JSON.stringify({
                    action: "login",
                    nama: nama,
                    device: getDevice()
                })
            });
        }catch(e){}

        localStorage.setItem("namaLogin", nama);

        window.location.href = "user.html";

    } else {
        alert("Password salah!");
        btn.disabled = false;
        btn.innerHTML = 'Masuk';
    }

    return false;
}

// 🔥 jalankan setelah render supaya lebih ringan
window.addEventListener("load", ()=>{
    setTimeout(loadNama, 100);
});

</script>
