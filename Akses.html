<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akses Diblokir</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: rgba(0,0,0,0.4);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 500px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .btn {
            margin-top: 20px;
            display: inline-block;
            padding: 12px 20px;
            background: #ff4b5c;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ff1e38;
        }

        footer {
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚫</div>
        <h1>Akses Diblokir</h1>
        <p>
            Website ini telah diblokir oleh <strong>Kementerian Komunikasi dan Digital</strong>.
        </p>
        <p>
            Pemblokiran dilakukan karena konten atau aktivitas pada situs ini
            tidak sesuai dengan peraturan yang berlaku di Indonesia.
        </p>
        <a href="#" class="btn">Pelajari Lebih Lanjut</a>

        <footer>
            © 2026 Kementerian Komunikasi dan Digital Republik Indonesia
        </footer>
    </div>
</body>
</html>
