<script>

const scriptURL="https://script.google.com/macros/s/AKfycbzjdnnjED9o5RyHOlaf7pPTtK8zAIZ3-er4sBTAP-T6X0F5qYehjhGXoW3GFAs4sdOj6w/exec";

let daftarNama=[];

// ambil nama dari Google Sheet
async function loadNama(){
    try{
        const res = await fetch(scriptURL);
        const data = await res.json();

        const select = document.getElementById("email");
        select.innerHTML = '<option value="">Masukan Abensi Anda</option>';

        if(data.namaAnggota){

            daftarNama = data.namaAnggota;

            data.namaAnggota.forEach((nama, index)=>{
                const opt = document.createElement("option");
                opt.value = index + 1;
                opt.textContent = (index + 1) + " - " + nama;
                select.appendChild(opt);
            });

        }

    }catch(e){
        alert("Gagal memuat data nama");
    }
}

// LOGIN
function loginHandler(event){
    event.preventDefault();

    const absen = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if(absen === ""){
        alert("Pilih absen dulu!");
        return false;
    }

    if(password === "12345678"){

        const nama = daftarNama[absen - 1];

        localStorage.setItem("namaLogin", nama);

        window.location.href = "user.html";

    } else {
        alert("Password salah!");
    }

    return false;
}

// jalankan saat halaman dibuka
loadNama();

</script>
